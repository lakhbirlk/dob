apiVersion: apps/v1
kind: Deployment
metadata:
  name: dob-backend
  namespace: dob
  labels:
    app: dob-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dob-backend
  template:
    metadata:
      labels:
        app: dob-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/username/dob-backend:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: dob-config
            - secretRef:
                name: dob-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
