# Local development profile — no Docker required
spring:
  datasource:
    url: jdbc:h2:mem:dob;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

storage:
  provider: minio
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: dob-files

razorpay:
  key-id: rzp_test_dummy
  key-secret: dummy
  webhook-secret: whsec_dummy

jwt:
  secret: dev-secret-key-for-local-development-only-change-in-prod

logging:
  level:
    com.dob: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
